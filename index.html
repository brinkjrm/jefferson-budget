<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jefferson St · Budget</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:         '#000000',
            card:       '#1c1c1e',
            card2:      '#2c2c2e',
            card3:      '#3a3a3c',
            sep:        'rgba(84,84,88,0.55)',
            lbl:        '#ffffff',
            lbl2:       '#8e8e93',
            lbl3:       '#636366',
            acc:        '#0a84ff',
            pos:        '#30d158',
            neg:        '#ff453a',
            warn:       '#ff9f0a',
            ylw:        '#ffd60a',
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Display"', '"Helvetica Neue"', 'sans-serif'],
          },
          borderRadius: {
            apple: '12px',
            apple2: '16px',
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-font-smoothing: antialiased; }
    body { background-color: #000000; color: #ffffff; }

    .row-locked  { background-color: rgba(48, 209, 88, 0.08); }
    .row-pending { background-color: transparent; }
    .row-overage { background-color: rgba(255, 69, 58, 0.10); }

    input, select, textarea {
      background-color: #3a3a3c !important;
      color: #ffffff !important;
      border-color: rgba(84,84,88,0.55) !important;
    }
    input::placeholder { color: #636366 !important; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1c1c1e; }
    ::-webkit-scrollbar-thumb { background: #3a3a3c; border-radius: 3px; }

    .glass {
      background: rgba(28, 28, 30, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .tab-active {
      background: rgba(10, 132, 255, 0.18);
      color: #0a84ff;
    }

    .btn-primary {
      background: #0a84ff;
      color: #fff;
      border-radius: 10px;
      font-weight: 600;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary {
      background: #2c2c2e;
      color: #0a84ff;
      border-radius: 10px;
      font-weight: 600;
      transition: background .15s;
    }
    .btn-secondary:hover { background: #3a3a3c; }

    .apple-card {
      background: #1c1c1e;
      border-radius: 16px;
      border: 1px solid rgba(84,84,88,0.35);
    }

    .apple-input {
      background: #2c2c2e !important;
      border: 1px solid rgba(84,84,88,0.55) !important;
      border-radius: 8px !important;
      color: #fff !important;
      padding: 6px 10px;
      font-size: 14px;
      transition: border-color .15s;
    }
    .apple-input:focus {
      outline: none !important;
      border-color: #0a84ff !important;
      background: #2c2c2e !important;
    }

    tr:hover td, .data-row:hover { background: rgba(255,255,255,0.04) !important; }

    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
